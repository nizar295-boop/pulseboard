<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PulseBoard — Launcher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f6f4;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.logo-icon{width:40px;height:40px;background:#00853F;border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:20px;font-weight:700;color:#111}
.logo-sub{font-size:12px;color:#aaa;margin-bottom:28px}
.links{display:flex;flex-direction:column;gap:10px}
.link-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;text-decoration:none;border:1.5px solid #e5e7eb;transition:all .15s;cursor:pointer}
.link-btn:hover{border-color:#00853F;background:#f0faf4}
.link-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-label{font-size:14px;font-weight:600;color:#111}
.link-desc{font-size:12px;color:#aaa;margin-top:1px}
.arrow{margin-left:auto;color:#ccc;font-size:16px}
.link-btn:hover .arrow{color:#00853F}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <polyline points="2,12 5,12 7,5 9,19 11,9 13,15 15,12 22,12" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-name">PulseBoard</div>
  </div>
  <div class="logo-sub">Ton service dans ta poche 🇸🇳</div>

  <div class="links">
    <a href="login.html" class="link-btn">
      <div class="link-icon" style="background:#f0faf4">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#00853F" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </div>
      <div>
        <div class="link-label">Page de connexion</div>
        <div class="link-desc">Login · Inscription · Mot de passe</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="dashboard.html" class="link-btn">
      <div class="link-icon" style="background:#EFF6FF">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#2563EB" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </div>
      <div>
        <div class="link-label">Dashboard</div>
        <div class="link-desc">Lits · Patients · Relève · Chat</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="preview.html" class="link-btn">
      <div class="link-icon" style="background:#FFF7ED">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#F59E0B" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div>
        <div class="link-label">Landing page</div>
        <div class="link-desc">Présentation · Tarifs · Hôpitaux</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
</div>
</body>
</html>
